$kind: http-request
url: "{{base_url}}/experience"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: text
      key: job_title
      value: " Jr. Software Developer"
    - type: text
      key: recruiter_name
      value: " Datascape IT Limited"
    - type: text
      key: from_year
      value: " 2025"
    - type: text
      key: to_year
      value: ""
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 2000
